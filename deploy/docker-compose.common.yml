services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ./.data/ollama:/root/.ollama
      - ./scripts/ollama.entrypoint.sh:/entrypoint.sh
      - ./scripts/ollama.healthcheck.sh:/healthcheck.sh
    entrypoint: ["/usr/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "/healthcheck.sh"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 5s
    restart: unless-stopped
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    ports:
      - "${MCP_INSPECTOR_HOST}:6274:6274"
      - "${MCP_INSPECTOR_HOST}:6277:6277"
    environment:
      - HOST=0.0.0.0
      - CLIENT_PORT=6274
      - SERVER_PORT=6277
      - DANGEROUSLY_OMIT_AUTH=true
      - ALLOWED_ORIGINS=${MCP_INSPECTOR_ORIGINS}
    profiles:
      - debug
    restart: unless-stopped