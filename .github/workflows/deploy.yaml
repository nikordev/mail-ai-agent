name: Deploy Agent
on:
  push:
    branches:
      - main
      - upgrade-deploy

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set version
        run: echo "PROJECT_VERSION=$(docker run mail-ai-agent-app poetry version --short)" >> $GITHUB_ENV
      - name: Get version 1
        run: echo $PROJECT_VERSION
      - name: Get version 2
        run: echo "${{ env.PROJECT_VERSION }}"
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ env.PROJECT_VERSION }}, ghcr.io/${{ github.repository }}:latest