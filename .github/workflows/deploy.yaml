name: Deploy Agent
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build docker image
        run: docker build -t mail-ai-agent-app -f deploy/Dockerfile .
      - name: Set version
        run: echo "PROJECT_VERSION=$(docker run mail-ai-agent-app poetry version --short)" >> $GITHUB_ENV
      - name: Push image
        run: docker push mail-ai-agent-app:$PROJECT_VERSION
      - name: Push image latest
        run: docker push mail-ai-agent-app:latest