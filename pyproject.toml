[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["src"]

[tool.pytest_env]
env_files = [".env", ".test.env"]

[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    ".git",
    ".venv",
    ".idea",
    ".data"
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]
ignore = []
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"